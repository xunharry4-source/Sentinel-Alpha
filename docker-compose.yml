services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      SENTINEL_FRONTEND_HOST: 0.0.0.0
      SENTINEL_FRONTEND_PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  api:
    profiles: ["memory"]
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      SENTINEL_API_HOST: 0.0.0.0
      SENTINEL_API_PORT: 8001
    command: ["uvicorn", "sentinel_alpha.api.app:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  persistent-api:
    profiles: ["persistent"]
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      SENTINEL_API_HOST: 0.0.0.0
      SENTINEL_API_PORT: 8001
      SENTINEL_POSTGRES_DSN: postgresql://sentinel:sentinel@timescaledb:5432/sentinel_alpha
      SENTINEL_TIMESCALE_DSN: postgresql://sentinel:sentinel@timescaledb:5432/sentinel_alpha
      SENTINEL_REDIS_URL: redis://redis:6379/0
      SENTINEL_QDRANT_URL: http://qdrant:6333
    command: ["uvicorn", "sentinel_alpha.api.persistent_app:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  timescaledb:
    profiles: ["persistent"]
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: sentinel_alpha
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./docker/timescaledb/init/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./sql/product_schema.sql:/docker-entrypoint-initdb.d/010_product_schema.sql:ro
      - ./sql/behavioral_log.sql:/docker-entrypoint-initdb.d/020_behavioral_log.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_alpha"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    profiles: ["persistent"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    profiles: ["persistent"]
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  timescaledb-data:
  qdrant-data:
