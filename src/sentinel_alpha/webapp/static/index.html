<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0;url=http://127.0.0.1:8010/" />
  <title>Sentinel-Alpha | Legacy WebUI Redirect</title>
  <script src="./legacy-redirect.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #f4efe7, #e7f2ef);
      color: #132522;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    section {
      max-width: 640px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 85, 81, 0.16);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(19, 37, 34, 0.12);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      line-height: 1.6;
      margin: 0 0 12px;
    }
    a {
      color: #1f5551;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>旧版 WebUI 已下线</h1>
      <p>当前静态页面入口不再作为主界面使用，系统会自动跳转到 NiceGUI 主入口。</p>
      <p>如果浏览器没有自动跳转，请手动打开：</p>
      <p><a data-legacy-redirect-target href="http://127.0.0.1:8010/">http://127.0.0.1:8010/</a></p>
    </section>
  </main>
</body>
</html>
